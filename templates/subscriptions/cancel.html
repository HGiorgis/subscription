{% extends 'base.html' %}

{% block title %}Payment Cancelled{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="fas fa-times-circle text-warning" style="font-size: 5rem;"></i>
                    </div>
                    
                    <h2 class="mb-3">Payment Cancelled</h2>
                    <p class="lead text-muted mb-4">Your payment was cancelled. No charges were made.</p>
                    
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        You can try again anytime when you're ready.
                    </div>
                    
                    <div class="d-grid gap-2">
                        <a href="{% url 'subscriptions:plans' %}" class="btn btn-primary btn-lg">
                            <i class="fas fa-arrow-left"></i> Back to Plans
                        </a>
                        <a href="{% url 'core:home' %}" class="btn btn-outline-secondary">
                            Go to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
