{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Create Account - PremiumHub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body p-4">
                    <!-- Header -->
                    <div class="text-center mb-4">
                        <i class="fas fa-user-plus fa-2x text-primary mb-3"></i>
                        <h4 class="fw-bold">Create Account</h4>
                        <p class="text-muted small">Get started with PremiumHub</p>
                    </div>

                    <!-- Form -->
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        
                        <button type="submit" class="btn btn-primary w-100 mt-3">
                            <i class="fas fa-user-plus me-2"></i>Register
                        </button>
                    </form>
                    
                    <hr class="my-4">
                    
                    <p class="text-center small mb-0">
                        Already have an account? 
                        <a href="{% url 'accounts:login' %}" class="text-decoration-none fw-bold">
                            Sign in
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
